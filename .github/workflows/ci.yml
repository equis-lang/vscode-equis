name: VS Code Extension CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: npm install

    - name: Compile Extension
      run: npm run compile

    - name: Package extension
      run: npx @vscode/vsce package

    - name: Upload VSIX Artifact
      uses: actions/upload-artifact@v4
      with:
        name: vscode-equis-vsix
        path: "*.vsix"

  release:
    name: Create GitHub Release
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: vscode-equis-vsix

      - name: Publish to GitHub Releases
        run: |
          # The artifact is already downloaded into the current dir
          FILES=(*.vsix)
          if [ -f "${FILES[0]}" ]; then
            gh release create ${{ github.ref_name }} "${FILES[@]}" \
              --title "Equis Extension ${{ github.ref_name }}" \
              --generate-notes || \
            gh release upload ${{ github.ref_name }} "${FILES[@]}" --clobber
          fi
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
